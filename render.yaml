# Render Blueprint - Karyor (Mustard Oil) Deployment
# Same folder structure preserved
#
# Deploy steps:
# 1. Push this file + code to GitHub
# 2. In Render Dashboard → New → Blueprint
# 3. Connect your repo → it will auto-detect render.yaml
# 4. Fill the environment variables marked as sync: false in the dashboard

services:
  # ============================================
  # 1. BACKEND API (Node.js + Express + MongoDB)
  # ============================================
  - type: web
    name: karyor-api
    env: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: cd server && npm ci
    startCommand: cd server && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "true"
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SETTINGS_ENCRYPTION_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SHIPROCKET_EMAIL
        sync: false
      - key: SHIPROCKET_PASSWORD
        sync: false
      - key: SHIPROCKET_WEBHOOK_SECRET
        sync: false
      - key: CLIENT_URL
        value: https://karyor.com,https://www.karyor.com,https://karyor-store.onrender.com,https://karyor-admin.onrender.com
      - key: API_PUBLIC_URL
        value: https://karyor-api.onrender.com
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ADMIN_NAME
        value: Karyor Admin
      - key: SHIPROCKET_PICKUP_LOCATION
        value: Primary
      - key: SHIPROCKET_PICKUP_PINCODE
        value: "125001"
      - key: SHIPROCKET_COMPANY_NAME
        value: Karyor Farms
      - key: SHIPROCKET_COMPANY_PHONE
        value: "8708621377"
      - key: SHIPROCKET_COMPANY_EMAIL
        value: karyorfarms@gmail.com
      - key: SHIPROCKET_COMPANY_ADDRESS
        value: Hisar, Haryana
      - key: SHIPROCKET_COMPANY_CITY
        value: Hisar
      - key: SHIPROCKET_COMPANY_STATE
        value: Haryana
      - key: SHIPROCKET_COMPANY_PINCODE
        value: "125001"
      - key: SHIPROCKET_DEFAULT_WEIGHT
        value: "0.5"
      - key: SHIPROCKET_AUTO_ASSIGN_AWB
        value: "true"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GA4_PROPERTY_ID
        sync: false
      - key: GA4_SERVICE_ACCOUNT_JSON
        sync: false

  # ============================================
  # 2. MAIN STORE FRONTEND (Customer facing)
  # ============================================
  - type: static_site
    name: karyor-store
    rootDir: .
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://karyor-api.onrender.com
      - key: VITE_RAZORPAY_KEY_ID
        sync: false
      - key: VITE_STORE_URL
        value: https://karyor-store.onrender.com
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: VITE_GA_MEASUREMENT_ID
        value: G-CZ7HQG57CM

  # ============================================
  # 3. ADMIN PANEL (Separate from store)
  # ============================================
  - type: static_site
    name: karyor-admin
    rootDir: .
    buildCommand: npm ci && cd admin && npm ci && npm run build
    staticPublishPath: ./admin/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://karyor-api.onrender.com
      - key: VITE_STORE_URL
        value: https://karyor-store.onrender.com
      - key: VITE_RAZORPAY_KEY_ID
        sync: false